{% extends 'base.html' %} {% load static %} {% block content %}
<h1>Add Twit By Model Form Page</h1>
<div class="container tweetform">
  <form action="" method="POST">
    {% csrf_token %} {% for fields in form %}
    <div class="form-control">{{ fields.label_tag }} {{ fields }}</div>
    {% endfor %}

    <button type="submit" class="btn btn-primary">Send Twit</button>
  </form>
</div>
{% endblock content %}
